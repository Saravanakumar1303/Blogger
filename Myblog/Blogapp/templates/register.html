{% extends 'base.html' %}
{% block content %}
<style>
    .main-form{
        display: flex;
        justify-content: space-around;
        margin: 110px 0;
    }
    body{
    background:#f2f2f2;
    font-family: Arial, Helvetica, sans-serif;
    }

    .form-container{
        width:520px;
        margin:80px auto;
        background:#19b6b5;
        padding:40px;
        border-radius:25px;
        box-shadow:0px 10px 30px rgba(0,0,0,0.3);
    }

    .form-container h2{
        text-align:center;
        color:#4b0082;
        margin-bottom:30px;
    }

    .form-row{
        display:flex;
        align-items:center;
        margin-bottom:20px;
    }

    .form-row label{
        width:35%;
        color:white;
        font-size:18px;
    }

    /* All inputs increase 20% */

    .large-input{
        width:75%;
        padding:8px;
        border-radius:4px;
        border:1px solid #ccc;
    }

    .btn-area{
        text-align:center;
        margin-top:20px;
    }

    button{
        padding:10px 25px;
        border-radius:10px;
        border:2px solid black;
        background:white;
        font-weight:bold;
        font-size: 16px ;
        color:#b30000;
        cursor:pointer;
    }

    button:hover{
        background:#4b0082;
        color:white;
    }
    /* Footer Styles */
    .footer {
        background-color: #333;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 40px;
    }
    .footer a {
        color: white;
        margin: 0 15px;
        font-size: 20px;
    }
    .footer a:hover {
        color: #0b15d3ba;
    }
    .copyright {
        width: 100%;
        text-align: center;
        color: bisque;
        margin-top: 10px;
    }
</style>

<div class="main-form">
    <div class="form-container">

        <h2>User Registration</h2>

        <form method="POST">

            <div class="form-row">
                <label>First Name :</label>
                <input type="text" class="large-input">
            </div>

            <div class="form-row">
                <label>Last Name :</label>
                <input type="text" class="large-input">
            </div>

            <div class="form-row">
                <label>Email :</label>
                <input type="email" class="large-input">
            </div>

            <div class="form-row">
                <label>Password :</label>
                <input type="password" class="large-input">
            </div>

            <div class="form-row">
                <label>User Type :</label>
                <select class="large-input">
                    <option>Admin</option>
                    <option>Creator</option>
                    <option>Reader</option>
                </select>
            </div>

            <div class="btn-area">
                <button type="submit">Register</button>
            </div>

        </form>

    </div>
</div>

<!-- Footer -->
<footer>
    <div class="footer">
        <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
        <div class="copyright">
            &copy; 2025 My Blog | All rights reserved
        </div>
    </div>
</footer>
{% endblock %}
