<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E Blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* EBlog header */
        .brand {
            background-color: #f28b82;
            color: whitesmoke;
            font-size: 28px;
            font-weight: bold;
            padding: 15px 30px;
            letter-spacing: 2px;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            background-color: lightgray;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 16px;
        }

        .nav-bar div {
            padding: 20px 20px;
        }

        .nav-bar div a {
            text-decoration: none;
            color: black;
            font-weight: 500;
        }
      
        .nav-bar div:hover a {
            color: whitesmoke;
        }

        .search-bar {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        p {
            font-weight: bold;
            color: darkred;
            font-size: medium;
            margin: 0 20px;
        }
        .search-form {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .search-form input {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .search-form button {
            padding: 6px 10px;
            border: none;
            background-color: #24d656;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .search-form button:hover {
            background-color: #290303;
        }
        .profile-link {
            text-decoration: none;
            color: #64569d;
            font-weight: bold;
        }

        .profile-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Brand name -->
    <div class="brand">PyCodeSphere</div>

    <div class="nav-bar">
        <div><a href="{% url 'home' %}">Home</a></div>
        <div><a href="{% url 'recentpost' %}">Recent Post</a></div>

        {% if user.is_authenticated %}
            <div><a href="{% url 'createpost' %}">Create Post</a></div>

            {% if request.session.user_role == 'admin' %}
            <div><a href="{% url 'pending_posts' %}">Pending Posts</a></div>
            {% endif %}

            <div><a href="{% url 'viewpost' %}">View Post</a></div>

        <div class="search-bar">
            <form action="{% url 'search_posts' %}" method="get" class="search-form">
                <input type="text" name="q" placeholder="Search Posts">
                <button type="submit">Search</button>
            </form>
        </div>
            <p>Welcome <a href="{% url 'profile' %}" class="profile-link">
                {{ request.user.first_name }}</a>
        </p>
            <div><a href="{% url 'logout' %}">Logout</a></div>
        {% else %}
            <div><a href="{% url 'register' %}">Register</a></div>
            <div><a href="{% url 'login' %}">Login</a></div>
        {% endif %}
    </div>

    {% block content %}
    {% endblock %}
</body>
</html>
