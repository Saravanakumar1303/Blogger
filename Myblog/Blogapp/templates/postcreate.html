{% extends 'base.html' %}
{% block content%}
<style>
    .main-form {
        display: flex;
        justify-content: space-around;
        margin: -55px 0px;
    }

    body{
    background:#f2f2f2;
    font-family: Arial, Helvetica, sans-serif;
    }

    .post-container{
        width:550px;
        margin:80px auto;
        background:#17b7b5;
        padding:40px;
        border-radius:20px;
        box-shadow:0px 10px 25px rgba(0,0,0,0.2);
    }

    .post-container h2{
        text-align:center;
        color:#4b0082;
        margin-bottom:30px;
    }

    .form-group{
        display:flex;
        align-items:center;
        margin-bottom:20px;
    }

    .form-group label{
        width:35%;
        color:white;
        font-weight:bold;
    }

    .form-group input,
    .form-group textarea{
        width:65%;
        padding:8px;
        border-radius:5px;
        border:1px solid #ccc;
    }

    /* 20% wider textbox */
    .wide-input{
        width:78%;
    }

    /* short description */
    .short-desc{
        height:60px;
        resize:none;
    }

    /* long description */
    .desc{
        height:120px;
        resize:none;
    }

    .char-limit{
        display:block;
        margin-left:35%;
        font-size:12px;
        color:#eee;
    }

    .btn-area{
        text-align:center;
        margin-top:20px;
    }

    button{
        padding:10px 25px;
        border-radius:10px;
        border:2px solid #333;
        background:white;
        font-weight:bold;
        cursor:pointer;
    }

    button:hover{
        background:#4b0082;
        color:white;
    }

    /* Footer Styles */
    .footer {
        background-color: #333;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 155px; /* Push footer down */
    }
    .footer a {
        color: white;
        margin: 0 15px;
        font-size: 20px;
    }
    .footer a:hover {
        color: #0b15d3ba;
    }
    .copyright {
        width: 100%;
        text-align: center;
        color: bisque;
        margin-top: 10px;
    }
</style>

<div class="main-form">
    <div class="post-container">
        <h2>Post Creation</h2>
        <form method="POST">
            <div class="form-group">
                <label>Title :</label>
                <input type="text" name="title" maxlength="150" class="wide-input">
            </div>

            <div class="form-group">
                <label>Posted By :</label>
                <input type="text" name="author" value="{{request.user.first_name}}" class="wide-input">
            </div>

            <div class="form-group">
                <label>Short Description :</label>
                <textarea name="short_desc" maxlength="200" class="short-desc"></textarea>
            </div>

            <div class="form-group">
                <label>Description :</label>
                <textarea name="description" maxlength="1000" class="desc"></textarea>
                
            </div>

            <div class="btn-area">
                <button type="submit">Create Post</button>
            </div>

        </form>
    </div>
</div>

<!-- Footer -->
<footer>
    <div class="footer">
        <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
        <div class="copyright">
            &copy; 2025 My Blog | All rights reserved
        </div>
    </div>
</footer>
{% endblock %}
